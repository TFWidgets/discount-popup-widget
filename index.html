<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎁 Test Exit Intent</title>
    <style>
        body {
            font-family: 'Inter', system-ui, sans-serif;
            padding: 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
        }
        .instructions {
            background: rgba(255,255,255,0.1);
            padding: 30px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            margin-bottom: 30px;
        }
        .test-button {
            background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%);
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            margin: 10px;
        }
    </style>
</head>
<body>
    <div class="instructions">
        <h1>🎁 Тестирование Exit Intent</h1>
        <h3>📋 Как тестировать:</h3>
        <ol>
            <li><strong>Наведи курсор</strong> на эту область текста</li>
            <li><strong>Быстро выведи курсор вверх</strong> за границу окна браузера</li>
            <li><strong>Попап должен появиться</strong> при пересечении верхней границы</li>
        </ol>
        <p><strong>Важно:</strong> Курсор должен двигаться именно <strong>вверх</strong> и выходить через <strong>верхнюю границу</strong> окна!</p>
        
        <button class="test-button" onclick="showPopup()">Показать попап вручную</button>
        <button class="test-button" onclick="simulateExit()">Симулировать exit-intent</button>
        <button class="test-button" onclick="resetTrigger()">Сбросить триггер</button>
    </div>

    <!-- Exit Intent Popup -->
<!-- Exit Intent Popup -->
<script id="bhw-discount-local-config" type="application/json">
{
  "title": "Wait! Don't leave!",
  "message": "Get 25% off before you go",
  "couponCode": "STAY25",
  "iconHtml": "&#128683;",
  "buttonText": "Get discount",
  "dismissText": "No thanks",
  "showOnExit": true,
  "triggerDelay": 0,
  "showOnScroll": 0,
  "frequency": "always",
  "style": {
    "colors": {
      "headerBackground": "linear-gradient(135deg, #dc2626 0%, #b91c1c 100%)",
      "btnPrimary": "linear-gradient(135deg, #dc2626 0%, #b91c1c 100%)"
    }
  }
}
</script>
<script src="./embed.js" data-id="local"></script>

<script>
    function getPopup() {
        return window.BusinessHoursWidgets?.discountPopups?.local;
    }

    function showPopup() {
        const popup = getPopup();
        if (popup) {
            popup.show();
            console.log('✅ Попап показан вручную');
        } else {
            console.log('❌ Попап не найден');
        }
    }

    function simulateExit() {
        document.dispatchEvent(new MouseEvent('mouseleave', {
            clientY: -10,
            clientX: 100
        }));
        console.log('🚪 Exit-intent событие симулировано');
    }

    function resetTrigger() {
        sessionStorage.removeItem('bhw-discount-shown-local');
        localStorage.removeItem('bhw-discount-lastShown-local');
        location.reload();
    }

    setTimeout(() => {
        console.log('📋 Доступные попапы:', window.BusinessHoursWidgets?.discountPopups || {});
        const popup = getPopup();
        if (popup) {
            console.log('⚙️ Конфиг exit-intent:', {
                showOnExit: popup.config.showOnExit,
                frequency: popup.config.frequency
            });
        }
    }, 1000);
</script>


</body>
</html>
